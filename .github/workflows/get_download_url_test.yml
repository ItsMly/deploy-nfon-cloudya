name: Test ob Download-URL ermittelbar ist

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      version:
        description: 'Specific version to test (e.g. 2.1.0). Leave empty to test latest.'
        required: false
        default: ''

jobs:
  test-script:
    runs-on: windows-latest
    steps:
    - name: Check out repository
      uses: actions/checkout@v4

    - name: Install Pester
      shell: pwsh
      run: |
        Install-Module -Name Pester -Force -SkipPublisherCheck

    - name: Run Pester Tests
      shell: pwsh
      env:
        TEST_VERSION: ${{ github.event.inputs.version }}
      run: |
        Invoke-Pester -Path './.github/.tests/Deploy-NFONCloudya.tests.ps1' -Output Detailed